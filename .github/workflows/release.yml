name: Release

# Canonical verify -> release on push to main. Publishing uses npm Trusted
# Publishing (OIDC): npmjs.com lists this workflow filename (release.yml)
# and the "release" environment as the package's trusted publisher — see
# docs/releasing.md. Versioning is tag-only (no bump-back commits: the main
# ruleset requires signed commits, so semantic-release computes the version
# from Conventional Commits and stamps it into the published tarball; the
# checked-in package.json version is not authoritative).

on:
  push:
    branches: [main]

permissions: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version-file: ".node-version"
          cache: true
          # vp install alone maps to `npm install`; frozen keeps CI on `npm ci`
          # semantics so lockfile drift fails loudly instead of re-resolving.
          run-install: |
            - args: ["--frozen-lockfile"]
      - run: vp run verify # vp check + vp test + vp pack + cli smoke
      - run: npm pack --dry-run --ignore-scripts

  release:
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    # Never cancel a publish mid-flight; queue instead.
    concurrency:
      group: release-${{ github.repository }}-main
      cancel-in-progress: false
    permissions:
      contents: write # GitHub release + v* tag
      id-token: write # OIDC for npm trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
      # Secret-bearing job: no dependency cache, fresh install via setup-vp.
      # vp must be on PATH here because npm publish's prepack runs the verify
      # gate (vp check/test/pack). Trusted publishing authenticates from the
      # job's OIDC identity; no registry token is ever configured.
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version-file: ".node-version"
          run-install: |
            - args: ["--frozen-lockfile"]
      - uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
